# .gemini/commands/paperchange.toml
description = "Paper サーバーのバージョンを切り替えます（1.8, 1.12, 1.20, 1.21）。最新ビルドを自動取得します。"

prompt = """
Paper サーバーのバージョン変更を開始します。

1) メジャーバージョンを以下の4つから選択してください。
   - 8 (Minecraft 1.8.8)
   - 12 (Minecraft 1.12.2)
   - 20 (Minecraft 1.20.x)
   - 21 (Minecraft 1.21.x)

2) 次に、マイナーバージョンを指定してください（例: 1.20なら'6', 1.21なら'11'）。
   何も入力せずに Enter を押した場合はデフォルトが使用されます。

3) バージョンが決定したら、以下のスクリプトを実行します。
   `scripts/change_version.sh <メジャーバージョン> <マイナーバージョン>`

4) 実行完了後、サーバーの再起動が必要であることを伝えてください（Stop してから F5）。
"""
